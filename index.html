<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bath Personal Bus Announcement</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Courier New', Courier, monospace;
        }

        body {
            background: #222;
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        /* HUGE CENTERED LED DISPLAY */
        .led-container {
            width: 90%;
            max-width: 1200px;
            margin: 40px auto;
            display: flex;
            justify-content: center;
        }

        .led-board {
            background: #0a0a0a;
            border: 8px solid #444;
            border-radius: 12px;
            padding: 30px 20px;
            width: 100%;
            min-height: 200px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 30px rgba(0,255,0,0.2);
        }

        .led-text {
            color: #00ff00;
            font-size: 48px;
            font-weight: bold;
            letter-spacing: 4px;
            text-align: center;
            white-space: nowrap;
            overflow: hidden;
            position: relative;
        }

        /* NEARBY STOPS SECTION */
        .stops-section {
            width: 90%;
            max-width: 1000px;
            margin-top: 20px;
        }

        .stops-heading {
            font-size: 28px;
            margin-bottom: 20px;
            text-align: center;
            color: #00ff00;
        }

        .stops-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 15px;
        }

        .stop-card {
            background: #1a1a1a;
            border: 2px solid #333;
            border-radius: 8px;
            padding: 20px;
            text-align: center;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .stop-card:hover {
            border-color: #00ff00;
            box-shadow: 0 0 15px rgba(0,255,0,0.3);
            transform: translateY(-5px);
        }

        .stop-name {
            font-size: 22px;
            margin-bottom: 10px;
            color: #00ff00;
        }

        .stop-distance {
            font-size: 18px;
            color: #ccc;
        }

        /* LOADING/ERROR STYLES */
        .status-text {
            font-size: 32px;
            color: #ff4444;
            text-align: center;
            margin-top: 50px;
        }
    </style>
</head>
<body>
    <div class="led-container">
        <div class="led-board">
            <div class="led-text" id="ledDisplay">INITIALIZING SYSTEM...</div>
        </div>
    </div>

    <div class="stops-section" id="stopsContainer" style="display: none;">
        <h2 class="stops-heading">NEARBY BUS STOPS</h2>
        <div class="stops-grid" id="stopsGrid"></div>
    </div>

    <div class="status-text" id="statusMessage"></div>

    <script>
        const ledDisplay = document.getElementById('ledDisplay');
        const stopsContainer = document.getElementById('stopsContainer');
        const stopsGrid = document.getElementById('stopsGrid');
        const statusMessage = document.getElementById('statusMessage');

        // CONFIG: Focus on Bath area and set search radius (meters)
        const BATH_BOUNDS = { minLat: 51.37, maxLat: 51.42, minLon: -2.41, maxLon: -2.34 };
        const SEARCH_RADIUS = 1000; // 1km around user

        // SCROLL LED TEXT FUNCTION (CENTERED)
        function scrollLedText(fullText) {
            // Pad text for smooth looping
            const displayText = `   ${fullText.toUpperCase()}   `;
            let position = 0;
            const charWidth = 28; // Adjust based on font size
            const displayWidth = ledDisplay.offsetWidth;
            const textWidth = displayText.length * charWidth;

            // Clear any existing intervals
            if (window.scrollInterval) clearInterval(window.scrollInterval);

            // If text fits without scrolling, just center it
            if (textWidth <= displayWidth) {
                ledDisplay.textContent = displayText.trim();
                return;
            }

            // Start scrolling
            window.scrollInterval = setInterval(() => {
                position++;
                if (position > displayText.length) position = 0;
                
                // Calculate visible segment
                const start = position;
                const end = Math.min(start + Math.floor(displayWidth / charWidth), displayText.length);
                let visibleText = displayText.substring(start, end);
                
                // Add padding to keep centered if needed
                if (visibleText.length < Math.floor(displayWidth / charWidth)) {
                    visibleText += displayText.substring(0, Math.floor(displayWidth / charWidth) - visibleText.length);
                }

                ledDisplay.textContent = visibleText;
            }, 150);
        }

        // GET USER'S LOCATION
        function getUserLocation() {
            scrollLedText("SEARCHING FOR YOUR LOCATION...");
            
            if (!navigator.geolocation) {
                statusMessage.textContent = "Geolocation not supported by your browser";
                return;
            }

            navigator.geolocation.getCurrentPosition(
                position => findNearbyStops(position.coords.latitude, position.coords.longitude),
                error => {
                    statusMessage.textContent = `Location Error: ${error.message}`;
                    scrollLedText("UNABLE TO GET LOCATION");
                },
                { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
            );
        }

        // FIND NEARBY BUS STOPS USING OPENSTREETMAP API
        async function findNearbyStops(lat, lon) {
            // Check if user is in Bath area
            if (lat < BATH_BOUNDS.minLat || lat > BATH_BOUNDS.maxLat || lon < BATH_BOUNDS.minLon || lon > BATH_BOUNDS.maxLon) {
                scrollLedText("YOU ARE OUTSIDE BATH AREA");
                statusMessage.textContent = "Please move to Bath to see local stops";
                return;
            }

            scrollLedText("FINDING NEARBY BUS STOPS...");
            statusMessage.textContent = "";

            try {
                const response = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=bus+stop&lat=${lat}&lon=${lon}&radius=${SEARCH_RADIUS}&limit=20`);
                const stops = await response.json();

                if (stops.length === 0) {
                    scrollLedText("NO BUS STOPS FOUND NEAR YOU");
                    statusMessage.textContent = "Try expanding your search radius";
                    return;
                }

                // Show stops section and populate cards
                stopsContainer.style.display = "block";
                stopsGrid.innerHTML = "";
                scrollLedText(`FOUND ${stops.length} NEARBY STOPS`);

                stops.forEach(stop => {
                    // Calculate distance from user (approximate)
                    const distance = calculateDistance(lat, lon, stop.lat, stop.lon);
                    const stopCard = document.createElement('div');
                    stopCard.className = "stop-card";
                    stopCard.innerHTML = `
                        <div class="stop-name">${stop.display_name.split(',')[0]}</div>
                        <div class="stop-distance">${distance.toFixed(1)}m away</div>
                    `;
                    stopCard.addEventListener('click', () => {
                        scrollLedText(`NEXT STOP: ${stop.display_name.split(',')[0]}`);
                        // Add audio announcement here if needed
                    });
                    stopsGrid.appendChild(stopCard);
                });

            } catch (err) {
                scrollLedText("ERROR FETCHING STOPS");
                statusMessage.textContent = "Could not connect to stop database";
                console.error(err);
            }
        }

        // CALCULATE APPROXIMATE DISTANCE BETWEEN COORDINATES
        function calculateDistance(lat1, lon1, lat2, lon2) {
            const R = 6371000; // Earth radius in meters
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = 
                Math.sin(dLat/2) * Math.sin(dLat/2) +
                Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * 
                Math.sin(dLon/2) * Math.sin(dLon/2); 
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)); 
            return R * c; // Distance in meters
        }

        // INITIALIZE ON PAGE LOAD
        window.addEventListener('load', getUserLocation);
    </script>
</body>
</html>
