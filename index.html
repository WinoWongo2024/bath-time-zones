<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Location Tracker & Search</title>
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
          integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
          crossorigin=""/>
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom Styles -->
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            position: relative;
            min-height: 100vh;
            padding-bottom: 130px; 
        }
        /* Search Header */
        .search-header {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            background: rgba(0,0,0,0.8);
            padding: 15px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .search-container {
            width: 100%;
            max-width: 800px;
            position: relative;
        }
        #searchInput {
            width: 100%;
            padding: 12px 45px 12px 20px;
            border: none;
            border-radius: 25px;
            font-size: 1em;
            outline: none;
        }
        #searchBtn {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #2196f3;
            font-size: 1.2em;
            cursor: pointer;
        }
        #searchResults {
            position: absolute;
            top: calc(100% + 10px);
            left: 0;
            right: 0;
            background: white;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            max-height: 300px;
            overflow-y: auto;
            display: none;
            z-index: 1001;
        }
        .search-result {
            padding: 12px 20px;
            cursor: pointer;
            color: #333;
            border-bottom: 1px solid #eee;
        }
        .search-result:hover {
            background: #f5f5f5;
        }
        .search-result:last-child {
            border-bottom: none;
        }
        .result-highlight {
            color: #2196f3;
            font-weight: 500;
        }

        #map { position: absolute; top: 0; bottom: 0; width: 100%; }
        .alert { 
            position: absolute; 
            top: 80px; /* Below search header */
            left: 50%; 
            transform: translateX(-50%); 
            padding: 15px 25px; 
            background: white; 
            border-radius: 8px; 
            box-shadow: 0 2px 15px rgba(0,0,0,0.2); 
            z-index: 999;
            max-width: 90%;
            text-align: center;
        }
        .hidden { display: none; }
        .controls {
            position: absolute;
            top: 80px; /* Below search header */
            right: 20px;
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 15px;
            border-radius: 8px;
            z-index: 999;
            min-width: 220px;
        }
        .control-item {
            margin: 8px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .btn {
            padding: 6px 12px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            background: #2196f3;
            color: white;
            transition: background 0.2s;
        }
        .btn:hover { background: #1976d2; }
        footer {
            position: absolute;
            bottom: 0;
            width: 100%;
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 20px 15px;
            font-size: 0.9em;
            line-height: 1.6;
            z-index: 999;
        }
        .footer-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            max-width: 1400px;
            margin: 0 auto;
        }
        .footer-item strong { color: #42a5f5; }
        .status-indicator {
            display: inline-block;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-right: 8px;
        }
        .status-online { background: #2196f3; }
        .status-stale { background: #000000; }
        .status-error { background: #f44336; }
        .speed-display { font-weight: bold; color: #81d4fa; }
        .accuracy-display { font-style: italic; }
    </style>
</head>
<body>
    <!-- Search Header -->
    <div class="search-header">
        <div class="search-container">
            <input type="text" id="searchInput" placeholder="Search for places, addresses or postcodes...">
            <button id="searchBtn"><i class="fas fa-search"></i></button>
            <div id="searchResults"></div>
        </div>
    </div>

    <div id="permissionAlert" class="alert">
        <i class="fas fa-map-marker-alt"></i> Please allow location access to track your position!
    </div>
    <div id="errorAlert" class="alert hidden">
        <i class="fas fa-exclamation-triangle"></i> <span id="errorText">Could not retrieve your location.</span>
    </div>

    <div class="controls">
        <h3><i class="fas fa-sliders-h"></i> Tracker Controls</h3>
        <div class="control-item">
            <span><i class="fas fa-refresh"></i> Refresh Rate:</span>
            <span>1 second</span>
        </div>
        <div class="control-item">
            <span><i class="fas fa-crosshairs"></i> Accuracy:</span>
            <span id="accuracyValue">-- m</span>
        </div>
        <div class="control-item">
            <span><i class="fas fa-tachometer-alt"></i> Speed:</span>
            <span id="speedValue" class="speed-display">-- km/h</span>
        </div>
        <div class="control-item">
            <button id="centerBtn" class="btn"><i class="fas fa-map"></i> Center On Me</button>
            <button id="resetBtn" class="btn"><i class="fas fa-sync-alt"></i> Reset Tracker</button>
        </div>
        <div class="control-item">
            <span><i class="fas fa-history"></i> Update Count:</span>
            <span id="updateCount">0</span>
        </div>
    </div>

    <div id="map"></div>

    <footer>
        <div class="footer-grid">
            <div class="footer-item">
                <span id="statusDot" class="status-indicator status-stale"></span>
                <strong>Status:</strong> <span id="locationStatus">Not tracked</span>
            </div>
            <div class="footer-item">
                <strong><i class="fas fa-location-arrow"></i> GPS Coords:</strong> 
                <span id="gpsCoords">--, --</span>
                <span class="accuracy-display">(± -- m)</span>
            </div>
            <div class="footer-item">
                <strong><i class="fas fa-home"></i> Address:</strong> 
                <span id="address">Loading...</span>
            </div>
            <div class="footer-item">
                <strong><i class="fas fa-envelope"></i> Postcode:</strong> 
                <span id="postcode">--</span>
            </div>
            <div class="footer-item">
                <strong><i class="fas fa-clock"></i> Last Updated:</strong> 
                <span id="lastUpdated">--:--:--</span>
            </div>
        </div>
    </footer>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
            integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
            crossorigin=""></script>
    <script>
        // Initialize map
        const map = L.map('map').setView([51.505, -0.09], 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
        }).addTo(map);

        // Global variables
        let locationMarker = null;
        let searchMarker = null;
        let lastUpdateTime = null;
        let updateCounter = 0;
        let watchId = null;
        const STALE_THRESHOLD_MS = 5 * 60 * 1000;
        const REFRESH_INTERVAL_MS = 1000;
        let searchTimeout = null;

        // DOM Elements
        const statusDot = document.getElementById('statusDot');
        const locationStatus = document.getElementById('locationStatus');
        const gpsCoords = document.getElementById('gpsCoords');
        const address = document.getElementById('address');
        const postcode = document.getElementById('postcode');
        const lastUpdated = document.getElementById('lastUpdated');
        const accuracyValue = document.getElementById('accuracyValue');
        const speedValue = document.getElementById('speedValue');
        const updateCount = document.getElementById('updateCount');
        const centerBtn = document.getElementById('centerBtn');
        const resetBtn = document.getElementById('resetBtn');
        const searchInput = document.getElementById('searchInput');
        const searchBtn = document.getElementById('searchBtn');
        const searchResults = document.getElementById('searchResults');
        const errorText = document.getElementById('errorText');

        // Format time for display
        function formatTime(date) {
            return date.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
        }

        // Update location marker and status
        function updateMarkerStatus(lat, lng) {
            const isStale = lastUpdateTime && (Date.now() - lastUpdateTime) > STALE_THRESHOLD_MS;
            const isOffline = !navigator.onLine;
            const isError = !lat || !lng;

            // Remove existing location marker
            if (locationMarker) map.removeLayer(locationMarker);

            // Create main location marker
            const markerColor = isError ? '#f44336' : (isStale || isOffline) ? '#000' : '#2196f3';
            locationMarker = L.circleMarker([lat, lng], {
                radius: 8,
                color: '#fff',
                weight: 1,
                fillColor: markerColor,
                fillOpacity: 0.9
            }).addTo(map).bindPopup('Your current location (click to refresh)');

            // Update status UI
            statusDot.className = `status-indicator ${
                isError ? 'status-error' : 
                (isStale || isOffline) ? 'status-stale' : 'status-online'
            }`;
            
            if (isError) {
                locationStatus.textContent = 'Error tracking location';
            } else if (isOffline) {
                locationStatus.textContent = 'Offline (stale data)';
            } else if (isStale) {
                locationStatus.textContent = `Stale (${Math.round((Date.now() - lastUpdateTime)/60000)} mins since update)`;
            } else {
                locationStatus.textContent = 'Live & updating every second';
            }
        }

        // Geocoding: Address from coordinates
        async function getAddress(lat, lng) {
            try {
                const response = await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lng}&format=jsonv2&zoom=18`);
                const data = await response.json();
                address.textContent = data.display_name || 'No address found';
                postcode.textContent = data.address.postcode || '--';
            } catch (err) {
                address.textContent = 'Address unavailable';
                postcode.textContent = '--';
            }
        }

        // Search places as user types
        async function searchPlaces(query) {
            if (!query.trim()) {
                searchResults.style.display = 'none';
                return;
            }

            try {
                const response = await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(query)}&format=jsonv2&limit=5`);
                const results = await response.json();

                // Show results
                searchResults.style.display = results.length ? 'block' : 'none';
                searchResults.innerHTML = '';

                results.forEach(result => {
                    const item = document.createElement('div');
                    item.className = 'search-result';
                    
                    // Highlight search query in result text
                    const highlightedText = result.display_name.replace(
                        new RegExp(query, 'gi'),
                        match => `<span class="result-highlight">${match}</span>`
                    );
                    item.innerHTML = highlightedText;

                    // On click: center map and add marker
                    item.addEventListener('click', () => {
                        const lat = parseFloat(result.lat);
                        const lng = parseFloat(result.lon);
                        
                        // Remove existing search marker
                        if (searchMarker) map.removeLayer(searchMarker);
                        
                        // Add new search marker
                        searchMarker = L.marker([lat, lng])
                            .addTo(map)
                            .bindPopup(`<strong>${result.display_name}</strong>`)
                            .openPopup();
                        
                        // Center map on result
                        map.setView([lat, lng], 15);
                        
                        // Clear search input and results
                        searchInput.value = '';
                        searchResults.style.display = 'none';
                    });

                    searchResults.appendChild(item);
                });
            } catch (err) {
                searchResults.style.display = 'block';
                searchResults.innerHTML = '<div class="search-result">Could not load search results</div>';
                console.error('Search error:', err);
            }
        }

        // Update all location details
        function updateLocationDetails(position) {
            const lat = position.coords.latitude.toFixed(6);
            const lng = position.coords.longitude.toFixed(6);
            const accuracy = position.coords.accuracy.toFixed(1);
            const speed = (position.coords.speed ? (position.coords.speed * 3.6).toFixed(1) : 0);
            lastUpdateTime = Date.now();
            updateCounter++;

            // Update core UI
            gpsCoords.textContent = `${lat}, ${lng}`;
            accuracyValue.textContent = `${accuracy} m`;
            speedValue.textContent = `${speed} km/h`;
            lastUpdated.textContent = formatTime(new Date(lastUpdateTime));
            updateCount.textContent = updateCounter;
            document.querySelector('.accuracy-display').textContent = `(± ${accuracy} m)`;

            // Update map and status
            updateMarkerStatus(lat, lng);

            // Only update geocoding every 10 seconds
            if (updateCounter % 10 === 0) {
                getAddress(lat, lng);
            }

            // Hide alerts
            document.getElementById('permissionAlert').classList.add('hidden');
            document.getElementById('errorAlert').classList.add('hidden');
        }

        // Handle location errors
        function handleLocationError(error) {
            document.getElementById('permissionAlert').classList.add('hidden');
            const errorMsg = document.getElementById('errorAlert');
            errorMsg.classList.remove('hidden');

            switch(error.code) {
                case error.PERMISSION_DENIED:
                    errorText.textContent = 'Location access denied. Enable it in your browser settings.';
                    break;
                case error.POSITION_UNAVAILABLE:
                    errorText.textContent = 'Location data unavailable. Check your device settings.';
                    break;
                case error.TIMEOUT:
                    errorText.textContent = 'Request timed out. Trying again...';
                    break;
                default:
                    errorText.textContent = `Error tracking location: ${error.message}`;
            }

            statusDot.className = 'status-indicator status-error';
            locationStatus.textContent = 'Error tracking location';
            console.error('Location error:', error);
        }

        // Start tracking
        function startTracking() {
            if (navigator.geolocation) {
                watchId = navigator.geolocation.watchPosition(
                    updateLocationDetails,
                    handleLocationError,
                    { enableHighAccuracy: true, maximumAge: 0, timeout: REFRESH_INTERVAL_MS }
                );

                // Extra 1-second check
                setInterval(() => {
                    if (locationMarker) {
                        const latLng = locationMarker.getLatLng();
                        updateMarkerStatus(latLng.lat, latLng.lng);
                    }
                }, REFRESH_INTERVAL_MS);
            } else {
                document.getElementById('errorAlert').classList.remove('hidden');
                errorText.textContent = 'Your browser does not support location services.';
            }
        }

        // Reset tracker
        function resetTracker() {
            if (watchId) navigator.geolocation.clearWatch(watchId);
            if (locationMarker) map.removeLayer(locationMarker);
            if (searchMarker) map.removeLayer(searchMarker);
            
            locationMarker = null;
            searchMarker = null;
            updateCounter = 0;
            lastUpdateTime = null;
            
            // Reset UI
            gpsCoords.textContent = '--, --';
            accuracyValue.textContent = '-- m';
            speedValue.textContent = '-- km/h';
            lastUpdated.textContent = '--:--:--';
            updateCount.textContent = '0';
            address.textContent = 'Loading...';
            postcode.textContent = '--';

            // Restart tracking
            startTracking();
        }

        // Center map on user
        function centerMap() {
            if (locationMarker) {
                const latLng = locationMarker.getLatLng();
                map.setView([latLng.lat, latLng.lng], 17);
            }
        }

        // Search event listeners
        searchInput.addEventListener('input', () => {
            // Debounce search to avoid too many API calls
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(() => {
                searchPlaces(searchInput.value);
            }, 300);
        });

        searchBtn.addEventListener('click', () => {
            searchPlaces(searchInput.value);
        });

        // Close results when clicking outside
        document.addEventListener('click', (e) => {
            if (!e.target.closest('.search-container')) {
                searchResults.style.display = 'none';
            }
        });

        // Other event listeners
        centerBtn.addEventListener('click', centerMap);
        resetBtn.addEventListener('click', resetTracker);
        map.on('popupopen', centerMap);

        // Start on load
        startTracking();
    </script>
</body>
</html>
