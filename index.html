<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bath Personal Announcement System</title>
    <style>
        /* LED-style display */
        .led-board {
            background: #111;
            color: #0f0;
            font-family: 'Courier New', monospace;
            font-size: 24px;
            padding: 15px;
            border: 3px solid #555;
            margin: 20px 0;
            min-height: 60px;
            text-align: center;
            letter-spacing: 2px;
        }
        /* Location buttons (our "pins") */
        .location-pins {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 10px;
            margin-top: 20px;
        }
        .pin-button {
            padding: 12px;
            background: #2c3e50;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.3s;
        }
        .pin-button:hover {
            background: #34495e;
        }
        .pin-button.active {
            background: #e67e22;
        }
    </style>
</head>
<body>
    <h1>Bath Personal Announcement System</h1>
    <div class="led-board" id="ledDisplay">READY - SELECT LOCATION</div>
    <div class="location-pins" id="locationContainer"></div>

    <script>
        // 50+ Bath locations (we'll list a few here, easy to expand)
        const bathLocations = [
            { id: 1, name: "BATH ABBEY", audio: "https://example.com/audio/abbey.mp3" },
            { id: 2, name: "ROMAN BATHS", audio: "https://example.com/audio/roman-baths.mp3" },
            { id: 3, name: "ROYAL CRESCENT", audio: "https://example.com/audio/royal-crescent.mp3" },
            { id: 4, name: "PULTENEY BRIDGE", audio: "https://example.com/audio/pulteney.mp3" },
            { id: 5, name: "BATH SPA STATION", audio: "https://example.com/audio/spa-station.mp3" },
            // Add 50+ more locations here!
            { id: 55, name: "MENDIP HILLS VIEW", audio: "https://example.com/audio/mendip.mp3" }
        ];

        const ledDisplay = document.getElementById('ledDisplay');
        const locationContainer = document.getElementById('locationContainer');
        let currentAudio = null;

        // Create all "pin" buttons
        function setupPins() {
            bathLocations.forEach(location => {
                const button = document.createElement('button');
                button.className = 'pin-button';
                button.textContent = location.name;
                button.addEventListener('click', () => activatePin(location));
                locationContainer.appendChild(button);
            });
        }

        // Activate selected pin - show on display and play audio
        function activatePin(location) {
            // Stop any playing audio
            if (currentAudio) currentAudio.pause();
            
            // Update LED display with scrolling effect
            updateLedDisplay(location.name);
            
            // Play announcement
            currentAudio = new Audio(location.audio);
            currentAudio.play();

            // Highlight active button
            document.querySelectorAll('.pin-button').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
        }

        // LED-style scrolling text
        function updateLedDisplay(text) {
            let position = 0;
            text = ">>> " + text + " <<<";
            ledDisplay.textContent = text.substring(position, position + 16);
            
            const scrollInterval = setInterval(() => {
                position++;
                if (position > text.length - 16) position = 0;
                ledDisplay.textContent = text.substring(position, position + 16);
            }, 200);

            // Clear interval after 10 seconds
            setTimeout(() => clearInterval(scrollInterval), 10000);
        }

        // Initialize the system
        setupPins();
    </script>
</body>
</html>
