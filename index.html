<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Map Navigator</title>
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
          integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
          crossorigin=""/>
    <!-- Leaflet Routing Machine for directions -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.css" />
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom Styles -->
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            position: relative;
            min-height: 100vh;
            padding-bottom: 100px; 
        }
        /* Top Bar: Search + Route Inputs */
        .top-bar {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            background: rgba(0,0,0,0.8);
            padding: 15px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .route-inputs {
            width: 100%;
            max-width: 900px;
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            gap: 10px;
            align-items: center;
            margin-bottom: 10px;
        }
        .input-group {
            position: relative;
            width: 100%;
        }
        .route-input {
            width: 100%;
            padding: 12px 45px 12px 20px;
            border: none;
            border-radius: 25px;
            font-size: 1em;
            outline: none;
        }
        .input-icon {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #666;
        }
        .swap-btn {
            background: #2196f3;
            color: white;
            border: none;
            border-radius: 50%;
            width: 36px;
            height: 36px;
            cursor: pointer;
            font-size: 1.1em;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .get-route-btn {
            grid-column: 1 / -1;
            padding: 12px;
            border: none;
            border-radius: 25px;
            background: #2196f3;
            color: white;
            font-size: 1em;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
        }
        .get-route-btn:hover { background: #1976d2; }
        .search-results {
            position: absolute;
            top: calc(100% + 5px);
            left: 0;
            right: 0;
            background: white;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            max-height: 200px;
            overflow-y: auto;
            display: none;
            z-index: 1001;
            margin: 0 20px;
        }
        .search-result {
            padding: 10px 20px;
            cursor: pointer;
            color: #333;
            border-bottom: 1px solid #eee;
        }
        .search-result:hover { background: #f5f5f5; }
        .result-highlight { color: #2196f3; font-weight: 500; }

        /* Navigation Directions Panel */
        .directions-panel {
            position: absolute;
            top: 160px; /* Below top bar */
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            background: white;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            padding: 15px 25px;
            max-width: 90%;
            min-width: 300px;
            text-align: center;
            display: none;
        }
        .direction-step {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin: 10px 0;
        }
        .step-icon {
            background: #2196f3;
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2em;
        }
        .step-text {
            font-size: 1em;
            line-height: 1.4;
            color: #333;
            text-align: left;
        }
        .direction-controls {
            margin-top: 10px;
            display: flex;
            justify-content: center;
            gap: 15px;
        }
        .nav-btn {
            padding: 8px 16px;
            border: none;
            border-radius: 4px;
            background: #2196f3;
            color: white;
            cursor: pointer;
            transition: background 0.2s;
        }
        .nav-btn:disabled { background: #666; cursor: not-allowed; }
        .step-counter { color: #666; font-size: 0.9em; }

        #map { position: absolute; top: 0; bottom: 0; width: 100%; }
        .alert { 
            position: absolute; 
            top: 200px; /* Below directions panel */
            left: 50%; 
            transform: translateX(-50%); 
            padding: 15px 25px; 
            background: white; 
            border-radius: 8px; 
            box-shadow: 0 2px 15px rgba(0,0,0,0.2); 
            z-index: 999;
            max-width: 90%;
            text-align: center;
        }
        .hidden { display: none; }
        footer {
            position: absolute;
            bottom: 0;
            width: 100%;
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 15px;
            font-size: 0.9em;
            text-align: center;
            z-index: 999;
        }
        /* Hide default Leaflet Routing Machine controls */
        .leaflet-routing-container { display: none; }
    </style>
</head>
<body>
    <!-- Top Bar: Route Inputs -->
    <div class="top-bar">
        <div class="route-inputs">
            <div class="input-group">
                <i class="fas fa-map-marker-alt input-icon"></i>
                <input type="text" id="startInput" class="route-input" placeholder="Your location or start point...">
            </div>
            <button id="swapBtn" class="swap-btn"><i class="fas fa-exchange-alt"></i></button>
            <div class="input-group">
                <i class="fas fa-flag input-icon"></i>
                <input type="text" id="endInput" class="route-input" placeholder="Destination...">
            </div>
            <button id="getRouteBtn" class="get-route-btn"><i class="fas fa-route"></i> Get Route & Directions</button>
        </div>
        <div id="searchResults" class="search-results"></div>
    </div>

    <!-- Navigation Directions Panel -->
    <div id="directionsPanel" class="directions-panel">
        <h3><i class="fas fa-compass"></i> Navigation Directions</h3>
        <div class="direction-step">
            <div id="stepIcon" class="step-icon"><i class="fas fa-info"></i></div>
            <div id="stepText" class="step-text">Ready to start your journey!</div>
        </div>
        <div class="step-counter">Step <span id="currentStep">1</span> of <span id="totalSteps">0</span></div>
        <div class="direction-controls">
            <button id="prevStepBtn" class="nav-btn" disabled><i class="fas fa-chevron-left"></i> Previous</button>
            <button id="nextStepBtn" class="nav-btn"><i class="fas fa-chevron-right"></i> Next</button>
        </div>
    </div>

    <div id="errorAlert" class="alert hidden">
        <i class="fas fa-exclamation-triangle"></i> <span id="errorText">Could not load route. Please check your inputs.</span>
    </div>

    <div id="map"></div>

    <footer>
        <p>Powered by OpenStreetMap & Leaflet | <i class="fas fa-map"></i> Map Navigator</p>
    </footer>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
            integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
            crossorigin=""></script>
    <!-- Leaflet Routing Machine for route calculation -->
    <script src="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.js"></script>
    <script>
        // Initialize map
        const map = L.map('map').setView([51.505, -0.09], 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
        }).addTo(map);

        // Global variables
        let routingControl = null;
        let currentRouteSteps = [];
        let activeStepIndex = 0;
        let activeInput = null;
        let searchTimeout = null;

        // DOM Elements
        const startInput = document.getElementById('startInput');
        const endInput = document.getElementById('endInput');
        const swapBtn = document.getElementById('swapBtn');
        const getRouteBtn = document.getElementById('getRouteBtn');
        const searchResults = document.getElementById('searchResults');
        const directionsPanel = document.getElementById('directionsPanel');
        const stepIcon = document.getElementById('stepIcon');
        const stepText = document.getElementById('stepText');
        const currentStep = document.getElementById('currentStep');
        const totalSteps = document.getElementById('totalSteps');
        const prevStepBtn = document.getElementById('prevStepBtn');
        const nextStepBtn = document.getElementById('nextStepBtn');
        const errorAlert = document.getElementById('errorAlert');
        const errorText = document.getElementById('errorText');

        // Geocode address to coordinates
        async function geocodeAddress(query) {
            try {
                const response = await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(query)}&format=jsonv2&limit=1`);
                const results = await response.json();
                if (results.length) {
                    return {
                        lat: parseFloat(results[0].lat),
                        lng: parseFloat(results[0].lon),
                        name: results[0].display_name
                    };
                }
                return null;
            } catch (err) {
                console.error('Geocoding error:', err);
                return null;
            }
        }

        // Search places as user types
        async function searchPlaces(query, inputField) {
            activeInput = inputField;
            if (!query.trim()) {
                searchResults.style.display = 'none';
                return;
            }

            try {
                const response = await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(query)}&format=jsonv2&limit=5`);
                const results = await response.json();

                searchResults.style.display = results.length ? 'block' : 'none';
                searchResults.innerHTML = '';

                results.forEach(result => {
                    const item = document.createElement('div');
                    item.className = 'search-result';
                    
                    // Highlight search query
                    const highlightedText = result.display_name.replace(
                        new RegExp(query, 'gi'),
                        match => `<span class="result-highlight">${match}</span>`
                    );
                    item.innerHTML = highlightedText;

                    // Set input value when selected
                    item.addEventListener('click', () => {
                        activeInput.value = result.display_name;
                        searchResults.style.display = 'none';
                    });

                    searchResults.appendChild(item);
                });
            } catch (err) {
                searchResults.style.display = 'block';
                searchResults.innerHTML = '<div class="search-result">Could not load search results</div>';
                console.error('Search error:', err);
            }
        }

        // Load route and directions
        async function loadRoute() {
            // Get start and end locations
            const startLoc = await geocodeAddress(startInput.value);
            const endLoc = await geocodeAddress(endInput.value);

            if (!startLoc || !endLoc) {
                errorAlert.classList.remove('hidden');
                errorText.textContent = 'Could not find one or both locations. Please check your inputs.';
                directionsPanel.style.display = 'none';
                return;
            }

            // Remove existing route
            if (routingControl) map.removeControl(routingControl);

            // Create new route
            routingControl = L.Routing.control({
                waypoints: [
                    L.latLng(startLoc.lat, startLoc.lng),
                    L.latLng(endLoc.lat, endLoc.lng)
                ],
                routeWhileDragging: false,
                showAlternatives: false
            }).addTo(map);

            // Process route steps once loaded
            routingControl.on('routesfound', (e) => {
                const route = e.routes[0];
                currentRouteSteps = route.instructions;
                activeStepIndex = 0;

                // Update directions panel
                directionsPanel.style.display = 'block';
                errorAlert.classList.add('hidden');
                updateDirectionStep();

                // Center map on route
                map.fitBounds(route.coordinates);
            });

            // Handle route errors
            routingControl.on('routingerror', () => {
                errorAlert.classList.remove('hidden');
                errorText.textContent = 'Could not calculate route. Please try different locations.';
                directionsPanel.style.display = 'none';
            });
        }

        // Update displayed direction step
        function updateDirectionStep() {
            if (!currentRouteSteps.length) return;

            const step = currentRouteSteps[activeStepIndex];
            currentStep.textContent = activeStepIndex + 1;
            totalSteps.textContent = currentRouteSteps.length;

            // Update button states
            prevStepBtn.disabled = activeStepIndex === 0;
            nextStepBtn.disabled = activeStepIndex === currentRouteSteps.length - 1;

            // Update step icon based on type
            let icon = '<i class="fas fa-info"></i>';
            switch(step.type) {
                case 'Straight': icon = '<i class="fas fa-arrow-up"></i>'; break;
                case 'Turn': 
                case 'SharpTurn': 
                case 'SlightTurn': 
                    icon = `<i class="fas fa-arrow-${step.modifier.toLowerCase()}"></i>`; 
                    break;
                case 'Roundabout': icon = '<i class="fas fa-circle"></i>'; break;
                case 'DestinationReached': icon = '<i class="fas fa-flag-checkered"></i>'; break;
                case 'Merge': icon = '<i class="fas fa-code-branch"></i>'; break;
                case 'Exit': icon = '<i class="fas fa-sign-out-alt"></i>'; break;
            }

            // Update step content
            stepIcon.innerHTML = icon;
            stepText.textContent = step.text;
        }

        // Swap start and end inputs
        function swapLocations() {
            const temp = startInput.value;
            startInput.value = endInput.value;
            endInput.value = temp;
        }

        // Navigation controls
        function goToPrevStep() {
            if (activeStepIndex > 0) {
                activeStepIndex--;
                updateDirectionStep();
            }
        }

        function goToNextStep() {
            if (activeStepIndex < currentRouteSteps.length - 1) {
                activeStepIndex++;
                updateDirectionStep();
            }
        }

        // Auto-set start location to user's position
        function setCurrentLocation() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    (position) => {
                        const lat = position.coords.latitude;
                        const lng = position.coords.longitude;
                        // Reverse geocode to get address
                        fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lng}&format=jsonv2`)
                            .then(res => res.json())
                            .then(data => {
                                startInput.value = data.display_name || `Your location (${lat.toFixed(6)}, ${lng.toFixed(6)})`;
                            });
                    },
                    () => {
                        startInput.value = 'London, UK'; // Default if location denied
                    }
                );
            } else {
                startInput.value = 'London, UK'; // Default if no support
            }
        }

        // Event listeners
        startInput.addEventListener('input', () => {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(() => {
                searchPlaces(startInput.value, startInput);
            }, 300);
        });

        endInput.addEventListener('input', () => {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(() => {
                searchPlaces(endInput.value, endInput);
            }, 300);
        });

        swapBtn.addEventListener('click', swapLocations);
        getRouteBtn.addEventListener('click', loadRoute);
        prevStepBtn.addEventListener('click', goToPrevStep);
        nextStepBtn.addEventListener('click', goToNextStep);

        // Close results when clicking outside
        document.addEventListener('click', (e) => {
            if (!e.target.closest('.top-bar')) {
                searchResults.style.display = 'none';
            }
        });

        // Set default start location on load
        window.addEventListener('load', setCurrentLocation);
    </script>
</body>
</html>
