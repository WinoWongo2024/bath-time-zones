<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Map Navigator</title>
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
          integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
          crossorigin=""/>
    <!-- Leaflet Routing Machine -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.css" />
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom Styles -->
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            position: relative;
            min-height: 100vh;
            padding-bottom: 100px; 
        }
        /* Top Bar */
        .top-bar {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            background: rgba(0,0,0,0.8);
            padding: 15px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .route-inputs {
            width: 100%;
            max-width: 900px;
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            gap: 10px;
            align-items: center;
            margin-bottom: 10px;
        }
        .input-group {
            position: relative;
            width: 100%;
        }
        .route-input {
            width: 100%;
            padding: 12px 45px 12px 20px;
            border: none;
            border-radius: 25px;
            font-size: 1em;
            outline: none;
        }
        .input-icon {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #666;
        }
        .swap-btn {
            background: #2196f3;
            color: white;
            border: none;
            border-radius: 50%;
            width: 36px;
            height: 36px;
            cursor: pointer;
            font-size: 1.1em;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .get-route-btn {
            grid-column: 1 / -1;
            padding: 12px;
            border: none;
            border-radius: 25px;
            background: #2196f3;
            color: white;
            font-size: 1em;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
        }
        .get-route-btn:hover { background: #1976d2; }
        .search-results {
            position: absolute;
            top: calc(100% + 5px);
            left: 0;
            right: 0;
            background: white;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            max-height: 200px;
            overflow-y: auto;
            display: none;
            z-index: 1001;
            margin: 0 20px;
        }
        .search-result {
            padding: 10px 20px;
            cursor: pointer;
            color: #333;
            border-bottom: 1px solid #eee;
        }
        .search-result:hover { background: #f5f5f5; }
        .result-highlight { color: #2196f3; font-weight: 500; }

        /* Live Directions Panel */
        .directions-panel {
            position: absolute;
            top: 160px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            background: white;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            padding: 15px 25px;
            max-width: 90%;
            min-width: 300px;
            text-align: center;
            display: none;
        }
        .direction-step {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin: 10px 0;
        }
        .step-icon {
            background: #2196f3;
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2em;
        }
        .step-text {
            font-size: 1em;
            line-height: 1.4;
            color: #333;
            text-align: left;
        }
        .direction-stats {
            margin: 10px 0;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            font-size: 0.9em;
            color: #666;
        }
        .direction-controls {
            margin-top: 10px;
            display: flex;
            justify-content: center;
            gap: 15px;
        }
        .nav-btn {
            padding: 8px 16px;
            border: none;
            border-radius: 4px;
            background: #2196f3;
            color: white;
            cursor: pointer;
            transition: background 0.2s;
        }
        .nav-btn:disabled { background: #666; cursor: not-allowed; }
        .step-counter { color: #666; font-size: 0.9em; }

        #map { position: absolute; top: 0; bottom: 0; width: 100%; }
        .alert { 
            position: absolute; 
            top: 220px;
            left: 50%; 
            transform: translateX(-50%); 
            padding: 15px 25px; 
            background: white; 
            border-radius: 8px; 
            box-shadow: 0 2px 15px rgba(0,0,0,0.2); 
            z-index: 999;
            max-width: 90%;
            text-align: center;
        }
        .hidden { display: none; }
        /* Current location marker style */
        .current-location-marker {
            width: 16px;
            height: 16px;
            background: #2196f3;
            border: 2px solid white;
            border-radius: 50%;
            box-shadow: 0 0 5px rgba(0,0,0,0.5);
        }
        footer {
            position: absolute;
            bottom: 0;
            width: 100%;
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 15px;
            font-size: 0.9em;
            text-align: center;
            z-index: 999;
        }
        .leaflet-routing-container { display: none; }
    </style>
</head>
<body>
    <!-- Top Bar -->
    <div class="top-bar">
        <div class="route-inputs">
            <div class="input-group">
                <i class="fas fa-map-marker-alt input-icon"></i>
                <input type="text" id="startInput" class="route-input" placeholder="Your location or start point...">
            </div>
            <button id="swapBtn" class="swap-btn"><i class="fas fa-exchange-alt"></i></button>
            <div class="input-group">
                <i class="fas fa-flag input-icon"></i>
                <input type="text" id="endInput" class="route-input" placeholder="Destination...">
            </div>
            <button id="getRouteBtn" class="get-route-btn"><i class="fas fa-route"></i> Start Live Navigation</button>
        </div>
        <div id="searchResults" class="search-results"></div>
    </div>

    <!-- Live Directions Panel -->
    <div id="directionsPanel" class="directions-panel">
        <h3><i class="fas fa-compass"></i> Live Navigation</h3>
        <div class="direction-step">
            <div id="stepIcon" class="step-icon"><i class="fas fa-info"></i></div>
            <div id="stepText" class="step-text">Ready to start your journey!</div>
        </div>
        <div class="direction-stats">
            <div><strong>Distance Left:</strong> <span id="distanceLeft">-- km</span></div>
            <div><strong>Time Left:</strong> <span id="timeLeft">-- mins</span></div>
            <div><strong>Speed:</strong> <span id="currentSpeed">-- km/h</span></div>
        </div>
        <div class="step-counter">Step <span id="currentStep">1</span> of <span id="totalSteps">0</span></div>
        <div class="direction-controls">
            <button id="prevStepBtn" class="nav-btn" disabled><i class="fas fa-chevron-left"></i> Previous</button>
            <button id="nextStepBtn" class="nav-btn"><i class="fas fa-chevron-right"></i> Next</button>
            <button id="stopNavBtn" class="nav-btn" style="background:#f44336;"><i class="fas fa-stop"></i> Stop</button>
        </div>
    </div>

    <div id="permissionAlert" class="alert">
        <i class="fas fa-map-marker-alt"></i> Please allow location access for live navigation!
    </div>
    <div id="errorAlert" class="alert hidden">
        <i class="fas fa-exclamation-triangle"></i> <span id="errorText">Could not load route. Please check your inputs.</span>
    </div>

    <div id="map"></div>

    <footer>
        <p>Powered by OpenStreetMap & Leaflet | <i class="fas fa-map"></i> Live Map Navigator</p>
    </footer>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
            integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
            crossorigin=""></script>
    <!-- Leaflet Routing Machine -->
    <script src="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.js"></script>
    <script>
        // Initialize map
        const map = L.map('map').setView([51.505, -0.09], 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
        }).addTo(map);

        // Global variables
        let routingControl = null;
        let currentRoute = null;
        let currentRouteSteps = [];
        let activeStepIndex = 0;
        let currentLocationMarker = null;
        let watchId = null;
        let activeInput = null;
        let searchTimeout = null;
        let isNavigating = false;

        // DOM Elements
        const startInput = document.getElementById('startInput');
        const endInput = document.getElementById('endInput');
        const swapBtn = document.getElementById('swapBtn');
        const getRouteBtn = document.getElementById('getRouteBtn');
        const stopNavBtn = document.getElementById('stopNavBtn');
        const searchResults = document.getElementById('searchResults');
        const directionsPanel = document.getElementById('directionsPanel');
        const stepIcon = document.getElementById('stepIcon');
        const stepText = document.getElementById('stepText');
        const distanceLeft = document.getElementById('distanceLeft');
        const timeLeft = document.getElementById('timeLeft');
        const currentSpeed = document.getElementById('currentSpeed');
        const currentStep = document.getElementById('currentStep');
        const totalSteps = document.getElementById('totalSteps');
        const prevStepBtn = document.getElementById('prevStepBtn');
        const nextStepBtn = document.getElementById('nextStepBtn');
        const permissionAlert = document.getElementById('permissionAlert');
        const errorAlert = document.getElementById('errorAlert');
        const errorText = document.getElementById('errorText');

        // Geocode address to coordinates
        async function geocodeAddress(query) {
            try {
                const response = await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(query)}&format=jsonv2&limit=1`);
                const results = await response.json();
                if (results.length) {
                    return {
                        lat: parseFloat(results[0].lat),
                        lng: parseFloat(results[0].lon),
                        name: results[0].display_name
                    };
                }
                return null;
            } catch (err) {
                console.error('Geocoding error:', err);
                return null;
            }
        }

        // Search places as user types
        async function searchPlaces(query, inputField) {
            activeInput = inputField;
            if (!query.trim()) {
                searchResults.style.display = 'none';
                return;
            }

            try {
                const response = await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(query)}&format=jsonv2&limit=5`);
                const results = await response.json();

                searchResults.style.display = results.length ? 'block' : 'none';
                searchResults.innerHTML = '';

                results.forEach(result => {
                    const item = document.createElement('div');
                    item.className = 'search-result';
                    const highlightedText = result.display_name.replace(
                        new RegExp(query, 'gi'),
                        match => `<span class="result-highlight">${match}</span>`
                    );
                    item.innerHTML = highlightedText;
                    item.addEventListener('click', () => {
                        activeInput.value = result.display_name;
                        searchResults.style.display = 'none';
                    });
                    searchResults.appendChild(item);
                });
            } catch (err) {
                searchResults.style.display = 'block';
                searchResults.innerHTML = '<div class="search-result">Could not load search results</div>';
            }
        }

        // Update current location marker
        function updateCurrentLocation(position) {
            const lat = position.coords.latitude;
            const lng = position.coords.longitude;
            const speed = position.coords.speed ? (position.coords.speed * 3.6).toFixed(1) : 0;
            
            // Update speed display
            currentSpeed.textContent = speed || '--';

            // Update marker
            if (currentLocationMarker) {
                currentLocationMarker.setLatLng([lat, lng]);
            } else {
                currentLocationMarker = L.marker([lat, lng], {
                    icon: L.divIcon({
                        className: 'current-location-marker',
                        iconSize: [16, 16],
                        iconAnchor: [8, 8]
                    })
                }).addTo(map).bindPopup('Your Current Location');
            }

            // If navigating, update route and directions
            if (isNavigating && routingControl) {
                // Update start waypoint to current location
                routingControl.spliceWaypoints(0, 1, L.latLng(lat, lng));
                
                // Recalculate and update directions
                routingControl.once('routesfound', (e) => {
                    updateRouteData(e.routes[0]);
                });
            }
        }

        // Update route data and directions
        function updateRouteData(route) {
            currentRoute = route;
            currentRouteSteps = route.instructions;

            // Update stats
            distanceLeft.textContent = (route.summary.totalDistance / 1000).toFixed(1);
            timeLeft.textContent = Math.round(route.summary.totalTime / 60);

            // Find active step based on current position
            const closestStep = findClosestStep(currentLocationMarker.getLatLng(), currentRouteSteps);
            if (closestStep !== activeStepIndex) {
                activeStepIndex = closestStep;
                updateDirectionStep();
            }
        }

        // Find closest step to current location
        function findClosestStep(currentLatLng, steps) {
            let closestIndex = 0;
            let minDistance = Infinity;

            steps.forEach((step, index) => {
                const stepLatLng = L.latLng(step.maneuver.location.lat, step.maneuver.location.lng);
                const distance = currentLatLng.distanceTo(stepLatLng);
                if (distance < minDistance) {
                    minDistance = distance;
                    closestIndex = index;
                }
            });

            // If near end of current step, move to next
            if (minDistance < 50 && activeStepIndex < steps.length - 1) {
                return activeStepIndex + 1;
            }
            return closestIndex;
        }

        // Update displayed direction step
        function updateDirectionStep() {
            if (!currentRouteSteps.length) return;

            const step = currentRouteSteps[activeStepIndex];
            currentStep.textContent = activeStepIndex + 1;
            totalSteps.textContent = currentRouteSteps.length;

            // Update buttons
            prevStepBtn.disabled = activeStepIndex === 0;
            nextStepBtn.disabled = activeStepIndex === currentRouteSteps.length - 1;

            // Update icon
            let icon = '<i class="fas fa-info"></i>';
            switch(step.type) {
                case 'Straight': icon = '<i class="fas fa-arrow-up"></i>'; break;
                case 'Turn': 
                case 'SharpTurn': 
                case 'SlightTurn': 
                    icon = `<i class="fas fa-arrow-${step.modifier.toLowerCase()}"></i>`; 
                    break;
                case 'Roundabout': icon = '<i class="fas fa-circle"></i>'; break;
                case 'DestinationReached': 
                    icon = '<i class="fas fa-flag-checkered"></i>'; 
                    stepText.textContent = 'Destination reached!';
                    stopNavigation();
                    break;
                case 'Merge': icon = '<i class="fas fa-code-branch"></i>'; break;
                case 'Exit': icon = '<i class="fas fa-sign-out-alt"></i>'; break;
            }

            // Update content
            if (step.type !== 'DestinationReached') stepText.textContent = step.text;
            stepIcon.innerHTML = icon;
        }

        // Start navigation
        async function startNavigation() {
            const endLoc = await geocodeAddress(endInput.value);
            if (!endLoc) {
                errorAlert.classList.remove('hidden');
                errorText.textContent = 'Could not find destination. Please check your input.';
                return;
            }

            // Start location tracking
            if (navigator.geolocation) {
                permissionAlert.classList.add('hidden');
                errorAlert.classList.add('hidden');
                isNavigating = true;

                // Watch current location (update every second)
                watchId = navigator.geolocation.watchPosition(
                    (position) => {
                        updateCurrentLocation(position);
                        // Initialize route on first location update
                        if (!routingControl) {
                            const startLatLng = L.latLng(position.coords.latitude, position.coords.longitude);
                            routingControl = L.Routing.control({
                                waypoints: [startLatLng, L.latLng(endLoc.lat, endLoc.lng)],
                                routeWhileDragging: false,
                                showAlternatives: false,
                                createMarker: () => null // Disable default waypoint markers
                            }).addTo(map);

                            // Load initial route data
                            routingControl.on('routesfound', (e) => {
                                updateRouteData(e.routes[0]);
                                directionsPanel.style.display = 'block';
                                updateDirectionStep();
                                map.fitBounds(e.routes[0].coordinates);
                            });
                        }
                    },
                    (error) => {
                        permissionAlert.classList.add('hidden');
                        errorAlert.classList.remove('hidden');
                        switch(error.code) {
                            case error.PERMISSION_DENIED:
                                errorText.textContent = 'Location access denied. Enable it to use live navigation.';
                                break;
                            case error.POSITION_UNAVAILABLE:
                                errorText.textContent = 'Location data unavailable. Check your device settings.';
                                break;
                            default:
                                errorText.textContent = 'Could not track your location.';
                        }
                    },
                    { enableHighAccuracy: true, maximumAge: 0, timeout: 1000 }
                );
            } else {
                errorAlert.classList.remove('hidden');
                errorText.textContent = 'Your browser does not support location services.';
            }
        }

        // Stop navigation
        function stopNavigation() {
            isNavigating = false;
            if (watchId) navigator.geolocation.clearWatch(watchId);
            if (routingControl) map.removeControl(routingControl);
            if (currentLocationMarker) map.removeLayer(currentLocationMarker);
            
            routingControl = null;
            currentLocationMarker = null;
            directionsPanel.style.display = 'none';
            permissionAlert.classList.remove('hidden');
        }

        // Swap start and end
        function swapLocations() {
            const temp = startInput.value;
            startInput.value = endInput.value;
            endInput.value = temp;
        }

        // Navigation controls
        function goToPrevStep() {
            if (activeStepIndex > 0) {
                activeStepIndex--;
                updateDirectionStep();
            }
        }

        function goToNextStep() {
            if (activeStepIndex < currentRouteSteps.length - 1) {
                activeStepIndex++;
                updateDirectionStep();
            }
        }

        // Set default start location
        function setCurrentLocation() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    (position) => {
                        fetch(`https://nominatim.openstreetmap.org/reverse?lat=${position.coords.latitude}&lon=${position.coords.longitude}&format=jsonv2`)
                            .then(res => res.json())
                            .then(data => {
                                startInput.value = data.display_name || `Your location`;
                            });
                    },
                    () => {
                        startInput.value = 'Your location';
                    }
                );
            } else {
                startInput.value = 'Your location';
            }
        }

        // Event listeners
        startInput.addEventListener('input', () => {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(() => {
                searchPlaces(startInput.value, startInput);
            }, 300);
        });

        endInput.addEventListener('input', () => {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(() => {
                searchPlaces(endInput.value, endInput);
            }, 300);
        });

        swapBtn.addEventListener('click', swapLocations);
        getRouteBtn.addEventListener('click', startNavigation);
        stopNavBtn.addEventListener('click', stopNavigation);
        prevStepBtn.addEventListener('click', goToPrevStep);
        nextStepBtn.addEventListener('click', goToNextStep);

        document.addEventListener('click', (e) => {
            if (!e.target.closest('.top-bar')) {
                searchResults.style.display = 'none';
            }
        });

        // Initialize on load
        window.addEventListener('load', setCurrentLocation);
    </script>
</body>
</html>
