<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moving Road Signs</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="icons/icon-192x192.png" type="image/png">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Roboto', sans-serif; }
        body { 
            height: 100vh; 
            width: 100vw; 
            overflow: hidden; 
            background: #000; 
            color: white;
            position: relative;
        }

        /* Camera View Background */
        #camera-view {
            width: 100%;
            height: 100%;
            background: url('https://picsum.photos/id/1016/1920/1080') center/cover no-repeat;
            filter: brightness(0.8);
            position: relative;
        }

        /* Floating Road Signs */
        .road-sign {
            position: absolute;
            background: rgba(0, 0, 0, 0.85);
            border: 2px solid white;
            border-radius: 8px;
            padding: 1rem;
            transform-origin: center;
            transition: all 0.5s cubic-bezier(0.25, 0.1, 0.25, 1);
            z-index: 10;
            max-width: 250px;
        }

        .sign-distance {
            font-size: 1.2rem;
            font-weight: 700;
            color: #FFD700;
        }

        .sign-name {
            font-size: 1rem;
            margin: 0.5rem 0;
        }

        .sign-direction {
            font-size: 0.8rem;
            color: #ccc;
        }

        /* Sign Types */
        .sign-type-road { border-left: 4px solid #2196F3; }
        .sign-type-park { border-left: 4px solid #4CAF50; }
        .sign-type-shop { border-left: 4px solid #FF9800; }
        .sign-type-food { border-left: 4px solid #F44336; }
        .sign-type-landmark { border-left: 4px solid #9C27B0; }

        /* Control Panel */
        #control-panel {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.9);
            padding: 1rem 2rem;
            border-radius: 16px;
            z-index: 100;
        }

        #toggle-signs {
            background: #2196F3;
            border: none;
            color: white;
            padding: 0.8rem 1.5rem;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
        }

        /* Loading Screen */
        #loading {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: #000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #2196F3;
            border-top: 4px solid transparent;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 1rem;
        }

        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <!-- Loading Screen -->
    <div id="loading">
        <div class="spinner"></div>
        <p>Finding your location...</p>
    </div>

    <!-- Camera/Map Background -->
    <div id="camera-view"></div>

    <!-- Control Panel -->
    <div id="control-panel">
        <button id="toggle-signs">Toggle All Signs</button>
    </div>

    <script>
        // --- Local Places Database (Customize for your area!) ---
        const LOCAL_PLACES = [
            {
                name: "Bath Abbey",
                type: "landmark",
                lat: 51.3809,
                lng: -2.3609,
                defaultPos: { top: '20%', left: '60%' } // Default screen position
            },
            {
                name: "Royal Victoria Park",
                type: "park",
                lat: 51.3938,
                lng: -2.3552,
                defaultPos: { top: '40%', left: '30%' }
            },
            {
                name: "M&S Food Hall",
                type: "food",
                lat: 51.3782,
                lng: -2.3675,
                defaultPos: { top: '60%', left: '70%' }
            },
            {
                name: "Great Western Road",
                type: "road",
                lat: 51.3820,
                lng: -2.3700,
                defaultPos: { top: '30%', left: '20%' }
            },
            {
                name: "SouthGate Shopping Centre",
                type: "shop",
                lat: 51.3756,
                lng: -2.3630,
                defaultPos: { top: '70%', left: '50%' }
            }
        ];

        // --- Core Variables ---
        let userLocation = null;
        let signsActive = true;
        let roadSigns = [];

        // --- Calculate Distance Between Points ---
        function calculateDistance(lat1, lon1, lat2, lon2) {
            const R = 6371000; // Meters
            const φ1 = lat1 * Math.PI/180;
            const φ2 = lat2 * Math.PI/180;
            const Δφ = (lat2-lat1)*Math.PI/180;
            const Δλ = (lon2-lon1)*Math.PI/180;
            
            const a = Math.sin(Δφ/2)*Math.sin(Δφ/2) +
                      Math.cos(φ1)*Math.cos(φ2)*
                      Math.sin(Δλ/2)*Math.sin(Δλ/2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            return Math.round(R * c); // Distance in meters
        }

        // --- Create Floating Sign ---
        function createRoadSign(place) {
            const sign = document.createElement('div');
            sign.className = `road-sign sign-type-${place.type}`;
            sign.style.top = place.defaultPos.top;
            sign.style.left = place.defaultPos.left;

            // Update sign content
            function updateSignContent(distance) {
                sign.innerHTML = `
                    <div class="sign-distance">${distance}m away</div>
                    <div class="sign-name">${place.name}</div>
                    <div class="sign-direction">${place.type.charAt(0).toUpperCase() + place.type.slice(1)}</div>
                `;
            }

            // Initial update
            updateSignContent('Calculating...');
            
            document.getElementById('camera-view').appendChild(sign);
            return { element: sign, update: updateSignContent };
        }

        // --- Track User Location ---
        function trackUserLocation() {
            if (!navigator.geolocation) {
                alert("Geolocation not supported by your browser");
                return;
            }

            // Get initial location
            navigator.geolocation.getCurrentPosition(pos => {
                userLocation = {
                    lat: pos.coords.latitude,
                    lng: pos.coords.longitude
                };

                // Hide loading screen
                document.getElementById('loading').style.display = 'none';

                // Generate all signs
                LOCAL_PLACES.forEach(place => {
                    const sign = createRoadSign(place);
                    roadSigns.push({ place, sign });
                });

                // Update signs continuously
                setInterval(updateAllSigns, 1000);
            }, error => {
                document.getElementById('loading').innerHTML = `<p>Couldn't get location: ${error.message}</p>`;
            }, { enableHighAccuracy: true });
        }

        // --- Update All Signs ---
        function updateAllSigns() {
            if (!userLocation || !signsActive) return;

            roadSigns.forEach(({ place, sign }) => {
                const distance = calculateDistance(
                    userLocation.lat, userLocation.lng,
                    place.lat, place.lng
                );

                // Update distance text
                let distanceText = distance < 100 ? 'Almost there!' : `${distance}m`;
                sign.update(distanceText);

                // Move sign slightly based on position relative to user
                const offsetX = (Math.random() - 0.5) * 10;
                const offsetY = (Math.random() - 0.5) * 10;
                sign.element.style.transform = `translate(${offsetX}px, ${offsetY}px)`;
            });
        }

        // --- Toggle Signs On/Off ---
        document.getElementById('toggle-signs').addEventListener('click', () => {
            signsActive = !signsActive;
            document.querySelectorAll('.road-sign').forEach(sign => {
                sign.style.display = signsActive ? 'block' : 'none';
            });
            document.getElementById('toggle-signs').textContent = signsActive ? 'Hide All Signs' : 'Show All Signs';
        });

        // --- Start App ---
        trackUserLocation();
    </script>
</body>
</html>
