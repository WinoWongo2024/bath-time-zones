<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FreeNav - 100% Free Maps & Navigation</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="icons/icon-192x192.png" type="image/png">
    <!-- Leaflet Core -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <!-- Leaflet Routing Machine (Free Navigation) -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.css" />
    <script src="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.js"></script>
    <!-- OpenStreetMap Search -->
    <script src="https://unpkg.com/leaflet-control-geocoder@2.4.0/dist/Control.Geocoder.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet-control-geocoder@2.4.0/dist/Control.Geocoder.css" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Roboto, sans-serif; }
        :root { --primary: #2563EB; --secondary: #F97316; --dark: #1E293B; --light: #F8FAFC; }
        body { background: var(--light); color: var(--dark); min-height: 100vh; display: flex; flex-direction: column; }
        
        /* Header & Search Bar */
        header { background: var(--primary); color: white; padding: 1rem 5%; display: flex; align-items: center; gap: 1rem; position: relative; z-index: 1000; }
        .search-container { flex: 1; display: flex; gap: 0.5rem; }
        #searchFrom, #searchTo { flex: 1; padding: 0.8rem 1rem; border: none; border-radius: 6px; font-size: 1rem; }
        #startNavBtn { background: var(--secondary); color: white; border: none; padding: 0.8rem 1.5rem; border-radius: 6px; cursor: pointer; font-weight: 600; }
        #startNavBtn:hover { background: #EA580C; }
        .nav-toggle { background: none; border: 2px solid white; color: white; padding: 0.5rem 1rem; border-radius: 6px; cursor: pointer; display: none; }
        
        /* Map Container */
        #map { flex: 1; width: 100%; height: calc(100vh - 80px); z-index: 1; }
        
        /* Navigation Panel */
        .nav-panel { position: fixed; bottom: 2rem; left: 5%; right: 5%; background: white; border-radius: 12px; padding: 1.5rem; box-shadow: 0 4px 20px rgba(0,0,0,0.15); z-index: 1000; display: none; }
        .nav-panel.active { display: block; }
        .nav-steps { margin-top: 1rem; display: grid; gap: 1rem; }
        .nav-step { display: flex; gap: 1rem; align-items: center; padding: 1rem; border-radius: 8px; background: var(--light); }
        .step-icon { width: 40px; height: 40px; border-radius: 50%; background: var(--primary); color: white; display: flex; align-items: center; justify-content: center; font-weight: bold; }
        .step-text { flex: 1; }
        .step-distance { color: #64748B; }
        
        /* Mobile Responsive */
        @media (max-width: 768px) {
            header { flex-direction: column; padding: 1rem; gap: 1rem; align-items: stretch; }
            .search-container { flex-direction: column; }
            #map { height: calc(100vh - 160px); }
            .nav-toggle { display: block; align-self: flex-start; }
        }
    </style>
</head>
<body>
    <header>
        <button class="nav-toggle" id="navToggle">☰ Menu</button>
        <h1>FreeNav</h1>
        <div class="search-container">
            <input type="text" id="searchFrom" placeholder="From (e.g. London Road, Bath)">
            <input type="text" id="searchTo" placeholder="To (e.g. Bath Abbey)">
            <button id="startNavBtn">Go!</button>
        </div>
    </header>

    <!-- Main Map -->
    <div id="map"></div>

    <!-- Navigation Instructions Panel -->
    <div class="nav-panel" id="navPanel">
        <h2 id="navTitle">Route Instructions</h2>
        <div class="nav-steps" id="navSteps"></div>
        <button id="clearNavBtn" class="btn">Clear Route</button>
    </div>

    <script>
        // Initialize Map (using OpenStreetMap tiles - 100% free!)
        const map = L.map('map').setView([51.3800, -2.3600], 13); // Default to Bath, UK

        // Free Map Tiles from OpenStreetMap
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
            maxZoom: 19
        }).addTo(map);

        // Add Free Search Control
        L.Control.geocoder({
            defaultMarkGeocode: false,
            geocoder: L.Control.Geocoder.nominatim() // Free search from OpenStreetMap
        }).addTo(map);

        // Elements
        const searchFrom = document.getElementById('searchFrom');
        const searchTo = document.getElementById('searchTo');
        const startNavBtn = document.getElementById('startNavBtn');
        const clearNavBtn = document.getElementById('clearNavBtn');
        const navPanel = document.getElementById('navPanel');
        const navTitle = document.getElementById('navTitle');
        const navSteps = document.getElementById('navSteps');
        const navToggle = document.getElementById('navToggle');

        // Routing Control (100% free via OpenStreetMap)
        let routingControl = null;

        // Geocode Address to Coordinates (Free via Nominatim)
        async function geocodeAddress(address) {
            if (!address) return null;
            try {
                const response = await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(address)}&format=json&limit=1`);
                const data = await response.json();
                if (data.length === 0) return null;
                return {
                    lat: parseFloat(data[0].lat),
                    lng: parseFloat(data[0].lon),
                    name: data[0].display_name
                };
            } catch (error) {
                console.error('Geocoding error:', error);
                alert('Could not find that location - please try another address');
                return null;
            }
        }

        // Build Navigation Steps UI
        function buildNavSteps(route) {
            navSteps.innerHTML = '';
            route.instructions.forEach((step, index) => {
                const stepEl = document.createElement('div');
                stepEl.className = 'nav-step';
                stepEl.innerHTML = `
                    <div class="step-icon">${index + 1}</div>
                    <div class="step-text">
                        <div>${step.text}</div>
                        <div class="step-distance">${(step.distance / 1000).toFixed(2)} km</div>
                    </div>
                `;
                navSteps.appendChild(stepEl);
            });
        }

        // Start Navigation
        async function startNavigation() {
            const fromAddr = searchFrom.value.trim();
            const toAddr = searchTo.value.trim();

            if (!fromAddr || !toAddr) {
                alert('Please enter both a start and end location');
                return;
            }

            // Get coordinates for both addresses
            const fromLoc = await geocodeAddress(fromAddr);
            const toLoc = await geocodeAddress(toAddr);

            if (!fromLoc || !toLoc) return;

            // Remove existing route if present
            if (routingControl) {
                map.removeControl(routingControl);
            }

            // Add new route
            routingControl = L.Routing.control({
                waypoints: [
                    L.latLng(fromLoc.lat, fromLoc.lng),
                    L.latLng(toLoc.lat, toLoc.lng)
                ],
                routeWhileDragging: true,
                geocoder: L.Control.Geocoder.nominatim(),
                lineOptions: {
                    styles: [{ color: '#2563EB', weight: 6 }]
                },
                summaryTemplate: '<h5>Route: {name}</h5><h6>{distance}, {time}</h6>'
            }).addTo(map);

            // Update navigation panel
            navTitle.textContent = `From ${fromLoc.name.split(',')[0]} to ${toLoc.name.split(',')[0]}`;
            navPanel.classList.add('active');

            // Build step-by-step instructions once route is calculated
            routingControl.on('routesfound', (e) => {
                const route = e.routes[0];
                buildNavSteps(route);
            });
        }

        // Clear Navigation
        function clearNavigation() {
            if (routingControl) {
                map.removeControl(routingControl);
                routingControl = null;
            }
            searchFrom.value = '';
            searchTo.value = '';
            navPanel.classList.remove('active');
        }

        // Toggle Mobile Menu
        function toggleNavMenu() {
            const searchContainer = document.querySelector('.search-container');
            searchContainer.style.display = searchContainer.style.display === 'none' ? 'flex' : 'none';
        }

        // Get User Location
        function getUserLocation() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition((position) => {
                    const userLat = position.coords.latitude;
                    const userLng = position.coords.longitude;
                    map.setView([userLat, userLng], 15);
                    L.marker([userLat, userLng]).addTo(map)
                        .bindPopup('You are here!')
                        .openPopup();
                    // Auto-fill "From" field with user location
                    geocodeAddress(`${userLat}, ${userLng}`).then(loc => {
                        if (loc) searchFrom.value = loc.name.split(',')[0];
                    });
                });
            }
        }

        // Event Listeners
        startNavBtn.addEventListener('click', startNavigation);
        clearNavBtn.addEventListener('click', clearNavigation);
        navToggle.addEventListener('click', toggleNavMenu);
        document.addEventListener('DOMContentLoaded', getUserLocation); // Auto-find user on load

        // PWA Service Worker
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('Service Worker registered'))
                    .catch(err => console.log('Service Worker error:', err));
            });
        }
    </script>
</body>
</html>
